# Default configuration for Compliance RAG Assistant
# This file contains all default settings that work out-of-the-box

# RAG System Configuration
rag:
  # Text chunking settings
  chunk_size: 1000              # Characters per chunk (adjust based on document type)
  chunk_overlap: 200            # Overlap between chunks to maintain context
  
  # Retrieval settings
  top_k: 4                      # Number of document chunks to retrieve per query
  
  # LLM settings
  temperature: 0.1              # Low = more deterministic, High = more creative (0.0-1.0)
  max_tokens: 2000              # Maximum tokens in generated response
  
  # Search settings
  search_type: "similarity"     # Options: similarity, mmr (maximal marginal relevance)
  score_threshold: 0.7          # Minimum similarity score (0.0-1.0)

# Embedding Model Configuration
embeddings:
  # HuggingFace model for creating embeddings
  model: "sentence-transformers/all-MiniLM-L6-v2"
  # Other good options:
  # - "sentence-transformers/all-mpnet-base-v2" (better quality, slower)
  # - "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2" (multilingual)
  
  # Device to run embeddings on
  device: "cpu"                 # Options: cpu, cuda, mps (Apple Silicon)
  
  # Batch processing
  batch_size: 32                # Number of texts to embed at once
  
  # Normalization
  normalize_embeddings: true    # Normalize vectors for better similarity search

# Vector Store Configuration (FAISS)
vector_store:
  type: "faiss"                 # Vector database type (currently only FAISS)
  
  # FAISS index type
  index_type: "IndexFlatL2"     # Options: IndexFlatL2, IndexFlatIP, IndexIVFFlat
  
  # Storage location
  persist_directory: "./data/vector_db"
  
  # Auto-save after operations
  auto_save: true

# Large Language Model Configuration
llm:
  # Provider selection
  provider: "ollama"            # Options: openai, ollama, anthropic (future)
  
  # Model name (depends on provider)
  model: "tinyllama"               # For Ollama: llama2, mistral, codellama, etc.
                                # For OpenAI: gpt-3.5-turbo, gpt-4, etc.
  
  # Generation parameters
  temperature: 0.1              # Randomness in generation (0.0-1.0)
  max_tokens: 2000              # Maximum length of generated response
  top_p: 0.9                    # Nucleus sampling parameter
  frequency_penalty: 0.0        # Penalize frequent tokens (-2.0 to 2.0)
  presence_penalty: 0.0         # Penalize tokens already in text (-2.0 to 2.0)
  
  # Ollama-specific settings
  base_url: "http://localhost:11434"
  
  # Timeout settings
  request_timeout: 60           # Seconds to wait for LLM response
  
  # Retry settings
  max_retries: 3
  retry_delay: 1                # Seconds between retries

# File Paths Configuration
paths:
  # Main directories
  documents: "./data/regulatory_documents"
  vector_db: "./data/vector_db"
  logs: "./logs"
  temp: "./temp"
  
  # Subdirectories for organization
  documents_by_regulation:
    gdpr: "./data/regulatory_documents/gdpr"
    sox: "./data/regulatory_documents/sox"
    hipaa: "./data/regulatory_documents/hipaa"
    pci_dss: "./data/regulatory_documents/pci_dss"
    iso_27001: "./data/regulatory_documents/iso_27001"

# Logging Configuration
logging:
  # Log level
  level: "INFO"                 # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  
  # Log file settings
  file: "./logs/app.log"
  
  # Log format
  format: "json"                # Options: json, text
  
  # Rotation settings
  rotation: "10 MB"             # Rotate when file reaches this size
  retention: "30 days"          # Keep logs for this duration
  compression: "zip"            # Compress rotated logs
  
  # Console logging
  console: true
  colorize: true

# API Configuration (FastAPI)
api:
  # Server settings
  host: "0.0.0.0"               # Listen on all interfaces
  port: 8000                    # API port
  
  # Worker settings
  workers: 4                    # Number of worker processes
  reload: false                 # Auto-reload on code changes (dev only)
  
  # CORS settings
  cors_enabled: true
  cors_origins:
    - "*"                       # Allow all origins (restrict in production)
  cors_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
  cors_headers:
    - "*"
  
  # Rate limiting
  rate_limit_enabled: false
  rate_limit_requests: 100      # Requests per period
  rate_limit_period: 3600       # Period in seconds (1 hour)
  
  # API documentation
  docs_url: "/docs"
  redoc_url: "/redoc"
  
  # Request limits
  max_upload_size: 10485760     # 10 MB in bytes
  max_query_length: 5000        # Maximum characters in query

# UI Configuration (Gradio)
ui:
  # Server settings
  host: "0.0.0.0"
  port: 7860
  
  # Sharing
  share: false                  # Create public URL (useful for demos)
  
  # Interface settings
  theme: "soft"                 # Gradio theme
  show_error: true              # Show detailed errors
  
  # Examples
  show_examples: true
  num_examples: 5
  
  # Queue settings
  enable_queue: true
  max_size: 100                 # Maximum queue size

# Document Processing Configuration
document_processing:
  # Supported file types
  allowed_extensions:
    - ".pdf"
    - ".txt"
    - ".docx"
    - ".doc"
    - ".md"
  
  # Processing settings
  max_file_size: 52428800       # 50 MB in bytes
  
  # PDF processing
  pdf:
    extract_images: false
    extract_tables: true
  
  # Text cleaning
  remove_extra_whitespace: true
  remove_special_chars: false
  lowercase: false

# Query Processing Configuration
query_processing:
  # Query enhancement
  enhance_query: false          # Add context to queries
  
  # Query validation
  min_query_length: 3
  max_query_length: 500
  
  # Language detection
  detect_language: false
  
  # Query history
  save_history: true
  history_max_size: 1000

# Regulations Configuration
regulations:
  # Supported regulation types
  types:
    - "GDPR"
    - "SOX"
    - "HIPAA"
    - "PCI-DSS"
    - "ISO 27001"
    - "CCPA"
    - "FERPA"
    - "GLBA"
  
  # Default regulation focus
  default: null                 # null means search all

# Performance Configuration
performance:
  # Caching
  enable_cache: true
  cache_ttl: 3600               # Cache TTL in seconds
  
  # Batch processing
  batch_size: 10
  
  # Memory management
  max_memory_mb: 4096           # Maximum memory usage in MB

# Security Configuration
security:
  # API authentication
  require_auth: false           # Enable API authentication
  api_key_header: "X-API-Key"
  
  # Input sanitization
  sanitize_input: true
  
  # File upload security
  scan_uploads: false           # Virus scanning (requires additional setup)

# Monitoring Configuration
monitoring:
  # Metrics collection
  enable_metrics: false
  metrics_port: 9090
  
  # Health checks
  health_check_interval: 30     # Seconds
  
  # Performance tracking
  track_query_time: true
  track_token_usage: true

# Feature Flags
features:
  # Experimental features
  enable_multimodal: false      # Support for images, etc.
  enable_streaming: false       # Stream responses
  enable_citations: true        # Include source citations
  
  # Advanced features
  enable_rag_fusion: false      # Multiple query generation
  enable_reranking: false       # Re-rank retrieved documents






