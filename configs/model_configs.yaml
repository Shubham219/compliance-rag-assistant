# OpenAI Models
openai:
  gpt-3.5-turbo:
    temperature: 0.1
    max_tokens: 2000
    top_p: 0.9
    frequency_penalty: 0.0
    presence_penalty: 0.0
    best_for: "Fast, cost-effective queries"
  
  gpt-4:
    temperature: 0.0
    max_tokens: 3000
    top_p: 0.95
    frequency_penalty: 0.0
    presence_penalty: 0.0
    best_for: "Complex compliance analysis"
  
  gpt-4-turbo:
    temperature: 0.0
    max_tokens: 4000
    top_p: 0.95
    best_for: "Long documents, detailed analysis"

# Ollama Models
ollama:
  llama2:
    temperature: 0.1
    max_tokens: 2000
    context_window: 4096
    best_for: "General compliance queries, free"
  
  mistral:
    temperature: 0.1
    max_tokens: 2500
    context_window: 8192
    best_for: "Better quality, multilingual"
  
  codellama:
    temperature: 0.1
    max_tokens: 2000
    context_window: 16384
    best_for: "Technical compliance, code-related"
  
  mixtral:
    temperature: 0.1
    max_tokens: 3000
    context_window: 32768
    best_for: "Best open-source option, long context"

# Embedding Models
embeddings:
  all-MiniLM-L6-v2:
    dimensions: 384
    max_sequence_length: 256
    speed: "very fast"
    quality: "good"
    best_for: "General use, fastest"
  
  all-mpnet-base-v2:
    dimensions: 768
    max_sequence_length: 384
    speed: "moderate"
    quality: "excellent"
    best_for: "Best quality, slower"
  
  paraphrase-multilingual-MiniLM-L12-v2:
    dimensions: 384
    max_sequence_length: 128
    speed: "fast"
    quality: "good"
    best_for: "Multilingual support"

# Hugging Face Models
huggingface:
  meta-llama/Llama-3.1-8B:
    temperature: 0.1
    max_tokens: 4096
    provider="featherless-ai"
    best_for: "High-quality, open-source alternative to GPT-4"